services:
  - type: web
    name: oasa-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    envVars:
      - key: SHEET_ID_LEITURAS
        value: "1iPcUbhIqgEpkhjLo5_HcbmNWlsqlEjY24NvRj3F-3u4"
      - key: SHEET_ID_PARTICULARIDADES
        value: "1rYXoJNGvgZQhWOZNpbPZEblxE8Srkn7IC0Jz5gBPV0Y"
      - key: ABA_LEITURAS
        value: Registos
      - key: ABA_PARTICULARIDADES
        value: 04_Chaves_Merge
      - key: CACHE_TTL
        value: "300"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false

  - type: web
    name: oasa-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "window.OASA_API_BASE='$API_BASE_URL';" > config.js
    staticPublishPath: .
    envVars:
      - key: API_BASE_URL
        sync: false
